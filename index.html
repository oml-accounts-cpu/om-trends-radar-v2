<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owned Media Trends Radar — Winclap</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--black:#0A0A0A;--white:#FFFFFF;--red:#FE805B;--green:#1CC9B9;--purple:#CEABFF;--blue:#87DBFF;--yellow:#FFD447;--pink:#FF9B96;--bg:#F2F1EE;--card:#FFFFFF;--border:#E0DFDB;--t1:#0A0A0A;--t2:#555550;--t3:#9A9990}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
header{background:var(--black);color:var(--white)}
.header-inner{max-width:1100px;margin:0 auto;padding:20px 32px 0}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--red);margin-top:2px}
.brand-text{font-family:'Space Mono',monospace;font-size:12px;color:var(--white);letter-spacing:.06em}
.brand-sub{font-size:11px;color:var(--t3);font-family:'Space Mono',monospace;margin-top:2px}
.live-badge{display:flex;align-items:center;gap:6px;background:#1A1A1A;border:1px solid #333;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;color:var(--t3);font-family:'Space Mono',monospace}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-title{margin-bottom:20px}
.header-title h1{font-size:26px;font-weight:700;color:var(--white);line-height:1.2}
.header-title h1 span{color:var(--red)}
.header-title p{font-size:13px;color:var(--t3);margin-top:6px}
.tab-nav{display:flex;border-bottom:1px solid #1F1F1F}
.tab-btn{background:transparent;border:none;color:var(--t3);font-size:13px;font-weight:600;padding:12px 24px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;font-family:'DM Sans',sans-serif}
.tab-btn:hover{color:var(--white)}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.tab-content{display:none}.tab-content.active{display:block}
.container{max-width:860px;margin:0 auto;padding:32px 24px}
.week-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.week-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;cursor:pointer;user-select:none;transition:background .15s}
.week-header:hover{background:#FAFAF9}
.week-label{font-size:15px;font-weight:700}
.week-meta{font-size:12px;color:var(--t3);margin-top:3px;font-family:'Space Mono',monospace}
.week-right{display:flex;align-items:center;gap:12px}
.chevron{font-size:12px;color:var(--t3);transition:transform .25s}
.week-card.open .chevron{transform:rotate(180deg)}
.week-body{display:none;border-top:1px solid var(--border)}
.week-card.open .week-body{display:block}
.sec-item{border-bottom:1px solid var(--border)}.sec-item:last-child{border-bottom:none}
.sec-header{display:flex;align-items:center;gap:10px;padding:14px 22px;cursor:pointer;user-select:none;transition:background .15s}
.sec-header:hover{background:#FAFAF9}
.sec-icon{font-size:18px}
.sec-info{flex:1}
.sec-title{font-size:14px;font-weight:600}
.sec-sub{font-size:11px;color:var(--t3);margin-top:1px}
.sec-badge{background:var(--bg);color:var(--t2);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.sec-chevron{font-size:11px;color:var(--t3);transition:transform .2s}
.sec-item.open .sec-chevron{transform:rotate(180deg)}
.sec-body{display:none;padding:0 22px 18px}
.sec-item.open .sec-body{display:block}
.trend-item{padding:14px 0;border-bottom:1px solid var(--border);display:flex;gap:14px}
.trend-item:last-child{border-bottom:none}
.trend-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--t3);padding-top:2px;min-width:20px}
.trend-content{flex:1}
.trend-name{font-size:14px;font-weight:600;margin-bottom:4px}
.trend-why{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:6px}
.trend-meta-row{display:flex;gap:8px;margin-bottom:3px;align-items:baseline}
.trend-meta-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;min-width:76px;padding-top:1px}
.trend-meta-val{font-size:12px;color:var(--t2);line-height:1.4;flex:1}
.trend-tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--bg);color:var(--t2)}
.tag.channel{background:#EBF7FF;color:#2A7AB5}
.tag.format{background:#F3EEFF;color:#6B4DB8}
.tag.brand{background:#FEF1EC;color:#C05A30}
.empty-state{text-align:center;padding:24px;color:var(--t3);font-size:13px}
#tab-calendar .cal-wrap{max-width:1100px;margin:0 auto;padding:0 24px 40px}
.filters-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;margin:24px 0 20px;overflow:hidden}
.filters-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none}
.filters-header-left{display:flex;align-items:center;gap:10px}
.filters-title{font-size:14px;font-weight:700}
.filters-summary{font-size:12px;color:var(--t3)}
.filter-toggle-btn{background:var(--bg);border:1px solid var(--border);color:var(--t2);font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.filter-toggle-btn:hover{background:var(--border)}
.filters-body{display:none;border-top:1px solid var(--border);padding:16px 20px}
.filters-bar.open .filters-body{display:block}
.filter-section{margin-bottom:14px}
.filter-section:last-child{margin-bottom:0}
.filter-section-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-family:'Space Mono',monospace;margin-bottom:7px}
.filter-chips{display:flex;flex-wrap:wrap;gap:6px}
.filter-chip{background:var(--bg);border:1px solid var(--border);color:var(--t2);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.filter-chip:hover{border-color:var(--red);color:var(--red)}
.filter-chip.active{background:var(--black);border-color:var(--black);color:var(--white)}
.filter-chip.client-active{background:var(--red);border-color:var(--red);color:var(--white)}
.filters-footer{display:flex;justify-content:flex-end;padding-top:10px;border-top:1px solid var(--border);margin-top:10px}
.clear-filters-btn{background:none;border:none;color:var(--t3);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.clear-filters-btn:hover{color:var(--red)}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.results-count{font-size:12px;color:var(--t3);font-family:'Space Mono',monospace;margin-left:auto}
.active-pill{display:inline-flex;align-items:center;gap:5px;background:var(--black);color:var(--white);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.active-pill .x{cursor:pointer;opacity:.6;margin-left:2px}
.active-pill .x:hover{opacity:1}
.month-section{margin-bottom:28px}
.month-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.month-name{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2)}
.month-line{flex:1;height:1px;background:var(--border)}
.month-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--t3)}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.cal-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .18s}
.cal-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);border-color:var(--red)}
.cal-accent{height:3px}
.cal-accent.civica{background:var(--blue)}
.cal-accent.cultural{background:var(--purple)}
.cal-accent.comercial{background:var(--red)}
.cal-accent.festividad{background:var(--yellow)}
.cal-inner{padding:12px}
.cal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:7px}
.cal-date{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--t3)}
.cal-impact{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.impact-alto{background:#FDECEA;color:#C0392B}
.impact-medio{background:#FEF6E8;color:#B7770D}
.impact-bajo{background:#F2F2F0;color:var(--t3)}
.cal-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:6px}
.cal-bottom{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cal-flags{font-size:12px;letter-spacing:1px}
.cal-cat{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.cat-civica{background:#EBF7FF;color:#2A7AB5}
.cat-cultural{background:#F3EEFF;color:#6B4DB8}
.cat-comercial{background:#FEF1EC;color:#C05A30}
.cat-festividad{background:#FFFAE8;color:#9A7200}
.cal-clients{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.ctag{font-size:9px;font-weight:700;background:var(--bg);color:var(--t2);padding:2px 6px;border-radius:10px;border:1px solid var(--border)}
.no-results{text-align:center;padding:60px 24px;color:var(--t3);font-size:14px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal-top-bar{height:4px;border-radius:16px 16px 0 0}
.modal-top-bar.civica{background:var(--blue)}
.modal-top-bar.cultural{background:var(--purple)}
.modal-top-bar.comercial{background:var(--red)}
.modal-top-bar.festividad{background:var(--yellow)}
.modal-head{padding:20px 22px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-title{font-size:19px;font-weight:700;line-height:1.3;flex:1}
.modal-close{background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-close:hover{background:var(--border)}
.modal-body{padding:14px 22px 24px}
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.mlabel{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;min-width:72px}
.mdivider{height:1px;background:var(--border);margin:14px 0}
.msec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:'Space Mono',monospace;margin-bottom:7px}
.mdesc{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:14px}
.mbrand{background:#FEF7F5;border:1px solid #FADDD5;border-left:3px solid var(--red);border-radius:8px;padding:11px 13px;margin-bottom:14px}
.mbrand p{font-size:13px;color:var(--t2);line-height:1.5}
.mchips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.mchip{font-size:11px;font-weight:600;background:var(--bg);color:var(--t2);padding:3px 9px;border-radius:20px;border:1px solid var(--border)}
.mclients{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.mclient{font-size:11px;font-weight:700;background:var(--black);color:var(--white);padding:3px 10px;border-radius:20px}
.mclient-brief{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px;margin-bottom:8px}
.mclient-brief-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.mclient-brief-name{font-size:12px;font-weight:700;color:var(--t1)}
.mclient-brief-canal{font-size:10px;font-weight:600;background:#EBF7FF;color:#2A7AB5;padding:2px 8px;border-radius:20px}
.mclient-brief-angulo{font-size:11px;color:var(--t2);margin-bottom:6px;font-style:italic}
.mclient-brief-copy{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--t1);line-height:1.5;cursor:pointer;position:relative;word-break:break-word}
.no-client-note{font-size:12px;color:var(--t3);font-style:italic}
.subgroup{margin-bottom:14px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.subgroup-header{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;user-select:none}
.subgroup-label{font-size:12px;font-weight:700}
.subgroup-count{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;opacity:.8}
.subgroup-chevron{font-size:10px;transition:transform .2s}
.subgroup.open .subgroup-chevron{transform:rotate(180deg)}
.subgroup-body{display:none;border-top:1px solid var(--border);background:var(--card)}
.subgroup.open .subgroup-body{display:block}
.subgroup-body .trend-item{padding:12px 14px}
.subgroup-body .trend-item:last-child{border-bottom:none}
.trends-filters-wrap{max-width:860px;margin:24px auto 0;padding:0 24px}
.trend-sources{margin-top:6px}
.sources-toggle{background:none;border:none;color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;transition:color .15s}
.sources-toggle:hover{color:var(--red)}
.sources-list{display:none;margin-top:6px;padding:8px 10px;background:var(--bg);border-radius:6px;border-left:2px solid var(--border)}
.sources-list.open{display:block}
.source-item{display:flex;align-items:baseline;gap:6px;padding:3px 0}
.source-num{font-family:'Space Mono',monospace;font-size:9px;color:var(--t3);min-width:14px}
.source-link{font-size:11px;color:var(--blue);text-decoration:none;line-height:1.4;word-break:break-all}
.source-link:hover{text-decoration:underline;color:var(--red)}
.source-title{font-size:11px;color:var(--t2)}
.finance-section{border:1px solid #D4EDDA;border-radius:10px;background:#F6FDF7;margin:0 22px 16px;overflow:hidden}
.finance-header{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;user-select:none}
.finance-header:hover{background:#EDFAF0}
.finance-icon{font-size:16px}
.finance-title{font-size:13px;font-weight:700;color:#1A6B30;flex:1}
.finance-count{font-size:11px;font-weight:700;background:#D4EDDA;color:#1A6B30;padding:2px 8px;border-radius:20px}
.finance-chevron{font-size:11px;color:#4CAF50;transition:transform .2s}
.finance-section.open .finance-chevron{transform:rotate(180deg)}
.finance-body{display:none;padding:0 16px 14px}
.finance-section.open .finance-body{display:block}
.finance-item{padding:10px 0;border-bottom:1px solid #D4EDDA}
.finance-item:last-child{border-bottom:none}
.finance-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.finance-name{font-size:13px;font-weight:700;color:#1A3A20;flex:1}
.finance-flag{font-size:14px}
.finance-countries{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:2px}
.finance-why{font-size:12px;color:#2D5A3D;line-height:1.5;margin-bottom:6px}
.finance-action{background:#D4EDDA;border-left:3px solid #4CAF50;border-radius:6px;padding:7px 10px;font-size:11px;color:#1A3A20;line-height:1.5;font-style:italic}
.finance-type{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.ftype-pago{background:#D4EDDA;color:#1A6B30}
.ftype-fx{background:#FFF3CD;color:#856404}
.ftype-alerta{background:#FDECEA;color:#C0392B}
.ftype-ciclo{background:#EBF7FF;color:#2A7AB5}
/* PROXIMA SEMANA */
.next-week-banner{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border:1px solid #0f3460;border-radius:12px;margin:0 22px 16px;overflow:hidden}
.next-week-banner-header{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;user-select:none}
.next-week-banner-header:hover{background:rgba(255,255,255,.04)}
.next-week-banner-icon{font-size:16px}
.next-week-banner-title{font-size:13px;font-weight:700;color:#87DBFF;flex:1}
.next-week-banner-count{font-size:11px;font-weight:700;background:rgba(135,219,255,.15);color:#87DBFF;padding:2px 8px;border-radius:20px}
.next-week-banner-chevron{font-size:11px;color:#87DBFF;transition:transform .2s}
.next-week-banner.open .next-week-banner-chevron{transform:rotate(180deg)}
.next-week-banner-body{display:none;padding:0 16px 14px}
.next-week-banner.open .next-week-banner-body{display:block}
.next-week-finance{border:1px solid #0f3460;border-radius:10px;background:rgba(15,52,96,.3);margin-bottom:12px;overflow:hidden}
.next-week-finance-header{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer}
.next-week-finance-header:hover{background:rgba(135,219,255,.05)}
.next-week-finance-title{font-size:12px;font-weight:700;color:#87DBFF;flex:1}
.next-week-finance-count{font-size:10px;font-weight:700;background:rgba(135,219,255,.15);color:#87DBFF;padding:2px 7px;border-radius:20px}
.next-week-finance-chevron{font-size:10px;color:#87DBFF;transition:transform .2s}
.next-week-finance.open .next-week-finance-chevron{transform:rotate(180deg)}
.next-week-finance-body{display:none;padding:0 14px 12px}
.next-week-finance.open .next-week-finance-body{display:block}
.next-week-finance-item{padding:8px 0;border-bottom:1px solid rgba(135,219,255,.1)}
.next-week-finance-item:last-child{border-bottom:none}
.next-week-finance-name{font-size:12px;font-weight:700;color:#e0f0ff;margin-bottom:3px}
.next-week-finance-why{font-size:11px;color:#87DBFF;opacity:.8;line-height:1.5;margin-bottom:5px}
.next-week-finance-action{background:rgba(135,219,255,.08);border-left:2px solid #87DBFF;border-radius:4px;padding:5px 8px;font-size:11px;color:#87DBFF;font-style:italic}
.next-week-sec{margin-bottom:10px;border-radius:8px;overflow:hidden;border:1px solid rgba(135,219,255,.15)}
.next-week-sec-header{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;background:rgba(135,219,255,.04)}
.next-week-sec-header:hover{background:rgba(135,219,255,.08)}
.next-week-sec-icon{font-size:15px}
.next-week-sec-title{font-size:12px;font-weight:700;color:#e0f0ff;flex:1}
.next-week-sec-badge{font-size:10px;font-weight:700;background:rgba(135,219,255,.15);color:#87DBFF;padding:2px 7px;border-radius:20px}
.next-week-sec-chevron{font-size:10px;color:#87DBFF;transition:transform .2s}
.next-week-sec.open .next-week-sec-chevron{transform:rotate(180deg)}
.next-week-sec-body{display:none;background:rgba(10,10,20,.5)}
.next-week-sec.open .next-week-sec-body{display:block}
.next-week-subgroup{border-bottom:1px solid rgba(135,219,255,.08)}
.next-week-subgroup:last-child{border-bottom:none}
.next-week-subgroup-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;cursor:pointer}
.next-week-subgroup-label{font-size:11px;font-weight:700;color:#87DBFF;opacity:.8}
.next-week-subgroup-chevron{font-size:9px;color:#87DBFF;transition:transform .2s}
.next-week-subgroup.open .next-week-subgroup-chevron{transform:rotate(180deg)}
.next-week-subgroup-body{display:none}
.next-week-subgroup.open .next-week-subgroup-body{display:block}
.next-week-trend{padding:10px 12px;border-bottom:1px solid rgba(135,219,255,.06);display:flex;gap:10px}
.next-week-trend:last-child{border-bottom:none}
.next-week-trend-num{font-family:'Space Mono',monospace;font-size:10px;color:#87DBFF;opacity:.5;min-width:18px;padding-top:2px}
.next-week-trend-name{font-size:13px;font-weight:600;color:#e0f0ff;margin-bottom:3px}
.next-week-trend-why{font-size:12px;color:#87DBFF;opacity:.75;line-height:1.5;margin-bottom:5px}

function getClients(ev){
  return Object.entries(CLIENTS).filter(([n,c])=>{
    const cOk=ev.countries.some(ec=>c.countries.includes(ec));
    const sL=ev.sectors.map(s=>s.toLowerCase());
    const iOk=c.industry.some(ind=>IND[ind]&&sL.some(s=>IND[ind](s)));
    return cOk&&iOk;
  }).map(([n])=>n);
}

function sf(type,val,el){F[type]=val;document.getElementById("fc-"+type).querySelectorAll(".filter-chip").forEach(b=>b.classList.remove("active","client-active"));el.classList.add(type==="client"&&val!=="ALL"?"client-active":"active");renderCal();}

function renderCal(){
  const root=document.getElementById("cal-root");
  let ev=CALENDAR.filter(e=>{
    if(F.country!=="ALL"&&!e.countries.includes(F.country))return false;
    if(F.cat!=="ALL"&&e.category!==F.cat)return false;
    if(F.impact!=="ALL"&&e.impact!==F.impact)return false;
    if(F.industry!=="ALL"){const fn=IND[F.industry];const sL=e.sectors.map(s=>s.toLowerCase());if(!sL.some(s=>fn(s)))return false;}
    if(F.client!=="ALL"){const cl=CLIENTS[F.client];if(!cl)return false;const cOk=e.countries.some(c=>cl.countries.includes(c));const sL=e.sectors.map(s=>s.toLowerCase());const iOk=cl.industry.some(ind=>IND[ind]&&sL.some(s=>IND[ind](s)));if(!cOk||!iOk)return false;}
    return true;
  }).sort((a,b)=>a.date.localeCompare(b.date));
  const active=Object.entries(F).filter(([k,v])=>v!=="ALL");
  const toolbar=document.getElementById("toolbar");
  const pills=active.map(([k,v])=>`<span class="active-pill">${k}: ${v}<span class="x" onclick="sf('${k}','ALL',document.querySelector('#fc-${k} .filter-chip'))">×</span></span>`).join("");
  toolbar.innerHTML=`${pills}<span class="results-count" id="rCount">${ev.length} fecha${ev.length!==1?"s":""}</span>`;
  document.getElementById("fSummary").textContent=ev.length===CALENDAR.length?"Todos los eventos":`${ev.length} de ${CALENDAR.length}`;
  if(!ev.length){root.innerHTML=`<div class="no-results">Sin fechas para los filtros seleccionados.<br><button onclick="clearFilters()" style="margin-top:12px;background:var(--black);color:#fff;border:none;padding:7px 16px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;font-size:12px">Limpiar filtros</button></div>`;return;}
  const bm={};
  ev.forEach(e=>{const m=parseInt(e.date.split("-")[1])-1;if(!bm[m])bm[m]=[];bm[m].push(e);});
  root.innerHTML=Object.entries(bm).map(([mi,evs])=>{
    const cards=evs.map(e=>{
      const d=new Date(e.date+"T12:00:00");
      const ds=d.toLocaleDateString("es-CO",{day:"numeric",month:"short"}).toUpperCase();
      const fl=e.countries.map(c=>FLAGS[c]||"").join("");
      const rc=getClients(e);
      const cb=rc.slice(0,3).map(n=>`<span class="ctag">${CLIENTS[n].e} ${n.split(" ")[0]}</span>`).join("");
      const cm=rc.length>3?`<span class="ctag">+${rc.length-3}</span>`:"";
      const calIdx=CALENDAR.indexOf(e);
      return `<div class="cal-card" onclick="openM(${calIdx})"><div class="cal-accent ${e.category}"></div><div class="cal-inner"><div class="cal-top"><span class="cal-date">${ds}</span><span class="cal-impact impact-${e.impact}">${e.impact.toUpperCase()}</span></div><div class="cal-name">${e.name}</div><div class="cal-bottom"><span class="cal-flags">${fl}</span><span class="cal-cat cat-${e.category}">${e.category}</span></div>${rc.length?`<div class="cal-clients">${cb}${cm}</div>`:""}</div></div>`;
    }).join("");
    return `<div class="month-section"><div class="month-header"><span class="month-name">${MONTHS[parseInt(mi)]}</span><div class="month-line"></div><span class="month-count">${evs.length} fecha${evs.length!==1?"s":""}</span></div><div class="cal-grid">${cards}</div></div>`;
  }).join("");
}

function genClientBriefs(clientNames,category){
  const catKey=["comercial","cultural","civica","festividad"].includes(category)?category:"cultural";
  const badges=clientNames.map(n=>`<span class="mclient">${CLIENTS[n].e} ${n}</span>`).join("");
  const briefs=clientNames.map(n=>{
    const cl=CLIENTS[n];const act=cl.activations[catKey]||cl.activations["cultural"];
    return `<div class="mclient-brief"><div class="mclient-brief-header"><span class="mclient-brief-name">${cl.e} ${n}</span><span class="mclient-brief-canal">${act.canal}</span></div><div class="mclient-brief-angulo">↗ ${act.angulo}</div><div class="mclient-brief-copy" onclick="navigator.clipboard&&navigator.clipboard.writeText(this.textContent.trim())" title="Click para copiar">${act.copy}</div></div>`;
  }).join("");
  return `<div class="mclients" style="margin-bottom:10px">${badges}</div>${briefs}`;
}

function openM(idx){
  const e=CALENDAR[idx];if(!e)return;
  const rc=getClients(e);
  const d=new Date(e.date+"T12:00:00");
  const df=d.toLocaleDateString("es-CO",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const fl=e.countries.map(c=>FLAGS[c]||"").join(" ");
  document.getElementById("mBar").className="modal-top-bar "+e.category;
  document.getElementById("mTitle").textContent=e.name;
  document.getElementById("mBody").innerHTML=`
    <div class="mrow"><span class="mlabel">📅 Fecha</span><span style="font-size:12px;color:var(--t2)">${df}</span></div>
    <div class="mrow"><span class="mlabel">🌍 Países</span><span style="font-size:16px;letter-spacing:2px">${fl}</span></div>
    <div class="mrow"><span class="mlabel">📂 Tipo</span><span class="cal-cat cat-${e.category}" style="font-size:10px">${e.category}</span><span class="cal-impact impact-${e.impact}" style="font-size:9px;margin-left:6px">${e.impact.toUpperCase()}</span></div>
    <div class="mdivider"></div>
    <div class="msec">Contexto sociocultural</div>
    <div class="mdesc">${e.description}</div>
    <div class="msec">💡 Recomendación de marca</div>
    <div class="mbrand"><p>${e.brand}</p></div>
    <div class="msec">Sectores con oportunidad</div>
    <div class="mchips">${e.sectors.map(s=>`<span class="mchip">${s}</span>`).join("")}</div>
    <div class="mdivider"></div>
    <div class="msec">Clientes Winclap relevantes</div>
    ${rc.length?genClientBriefs(rc,e.category):`<p class="no-client-note">Ningún cliente activo tiene match directo de país + industria para esta fecha.</p>`}
  `;
  document.getElementById("mOverlay").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeMO(e){if(e.target===document.getElementById("mOverlay"))closeM();}
function closeM(){document.getElementById("mOverlay").classList.remove("open");document.body.style.overflow="";}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeM();});

        <div class="next-week-subgroup-header" onclick="toggleNextWeekSg('${sg.id}')">
          <span class="next-week-subgroup-label">${sg.label}</span>
          <span class="next-week-subgroup-chevron">▼</span>
        </div>
        <div class="next-week-subgroup-body">${trendsHtml}</div>
      </div>`;
    }).filter(Boolean).join("");
    if (!subgroupsHtml) return "";
    const total = (sec.subgroups||[]).reduce((s,sg)=>s+(sg.trends||[]).length,0);
    return `<div class="next-week-sec open" id="nws-${sec.id}-${week.id}">
      <div class="next-week-sec-header" onclick="toggleNextWeekSec('${sec.id}-${week.id}')">
        <span class="next-week-sec-icon">${sec.icon}</span>
        <span class="next-week-sec-title">${sec.title}</span>
        <span class="next-week-sec-badge">${total}</span>
        <span class="next-week-sec-chevron">▼</span>
      </div>
      <div class="next-week-sec-body">${subgroupsHtml}</div>
    </div>`;
  }).filter(Boolean).join("");
  const totalTrends = (nw.sections||[]).reduce((s,sec)=>s+(sec.subgroups||[]).reduce((ss,sg)=>ss+(sg.trends||[]).length,0),0);
  if (!totalTrends && !fin.length) return "";
  return `<div class="next-week-banner open" id="nwb-${week.id}">
    <div class="next-week-banner-header" onclick="toggleNextWeekBanner('${week.id}')">
      <span class="next-week-banner-icon">🔮</span>
      <span class="next-week-banner-title">${nw.label||"Lo que viene"}</span>
      <span class="next-week-banner-count">${totalTrends} trend${totalTrends!==1?"s":""}</span>
      <span class="next-week-banner-chevron">▼</span>
    </div>
    <div class="next-week-banner-body">${finHtml}${secsHtml}</div>
  </div>`;
}

// ── Trends filters ────────────────────────────────────────────────────────────
let TF = {country:"ALL", cat:"ALL", channel:"ALL", client:"ALL"};

function toggleTFilters(){const b=document.getElementById("tfBar"),btn=document.getElementById("tfToggleBtn");b.classList.toggle("open");btn.textContent=b.classList.contains("open")?"Cerrar filtros ▴":"Abrir filtros ▾";}
function stf(type,val,el){TF[type]=val;document.getElementById("tfc-"+type).querySelectorAll(".filter-chip").forEach(b=>b.classList.remove("active","client-active"));el.classList.add(type==="client"&&val!=="ALL"?"client-active":"active");renderTrends();}
function clearTFilters(){TF={country:"ALL",cat:"ALL",channel:"ALL",client:"ALL"};["country","cat","channel","client"].forEach(t=>{const chips=document.getElementById("tfc-"+t).querySelectorAll(".filter-chip");chips.forEach(c=>c.classList.remove("active","client-active"));chips[0].classList.add("active");});renderTrends();}

function trendMatchesClient(t,clientName){
  if(clientName==="ALL")return true;
  const cl=CLIENTS[clientName];if(!cl)return true;
  const indKeywords={fastfood:["gastro","restaur","comida","food","fmcg","delivery","aliment"],restaurantes:["gastro","restaur","comida","food","delivery"],fintech:["fintech","financ","seguro","banco","wallet","pago","remesa"],ecommerce:["retail","ecommerce","moda","electr","compras","b2b"],travel:["viaje","travel","turismo"],fitness:["fitness","deporte","salud","bienestar"],beauty:["bellez","cosmet","skincare","estetic","moda"],retail:["retail","moda","electr"],petshop:["mascot","pet","animal"],telecom:["telecom","tech","digital","celular"],seguros:["seguro","auto"],ong:["ong","educ","cultura","social"],b2b:["b2b","comercio"]};
  const tagValues=(t.tags||[]).map(tg=>tg.t.toLowerCase());
  const why=(t.why||"").toLowerCase()+" "+(t.name||"").toLowerCase();
  return cl.industry.some(ind=>{const kws=indKeywords[ind]||[];return kws.some(k=>why.includes(k)||tagValues.some(tv=>tv.includes(k)));});
}

function renderTrendItem(t,i,sid){
  const uid=sid+"-"+i;
  const visibleTags=(t.tags||[]).filter(tg=>tg.c!=="channel");
  const tagsHtml=visibleTags.length>0?`<div class="trend-tags">${visibleTags.map(tg=>`<span class="tag ${tg.c}">${tg.t}</span>`).join("")}</div>`:"";
  const pubHtml=t.pub?`<div class="trend-meta-row"><span class="trend-meta-label">PÚBLICO</span><span class="trend-meta-val">${t.pub}</span></div>`:"";
  const brandHtml=t.brand?`<div class="trend-meta-row"><span class="trend-meta-label">PARA MARCA</span><span class="trend-meta-val">${t.brand}</span></div>`:"";
  const srcHtml=(t.sources||[]).length>0?`<div class="trend-sources"><button class="sources-toggle" id="srcbtn-${uid}" onclick="toggleSources('${uid}')">▾ ver fuentes</button><div class="sources-list" id="src-${uid}">${(t.sources||[]).map((s,si)=>`<div class="source-item"><span class="source-num">[${si+1}]</span><a class="source-link" href="${s.url}" target="_blank" rel="noopener">${s.title}</a></div>`).join("")}</div></div>`:"";
  return `<div class="trend-item">
    <div class="trend-num">${String(i+1).padStart(2,"0")}</div>
    <div class="trend-content">
      <div class="trend-name">${t.name}</div>
      <div class="trend-why">${t.why}</div>
      ${pubHtml}${brandHtml}${tagsHtml}${srcHtml}
    </div>
  </div>`;
}

function filterTrends(trends){
  return trends.filter(t=>{
    if(TF.channel!=="ALL"){const hasChannel=(t.tags||[]).some(tg=>tg.c==="channel"&&tg.t===TF.channel);if(!hasChannel)return false;}
    if(!trendMatchesClient(t,TF.client))return false;
    return true;
  });
}

function renderTrends(){
  const root=document.getElementById("root");
  const active=Object.entries(TF).filter(([k,v])=>v!=="ALL");
  document.getElementById("tfSummary").textContent=active.length===0?"Todas las tendencias":active.map(([k,v])=>v).join(" · ");

  root.innerHTML=WEEKS.map(week=>{
    const fin=week.finance||[];
    const finHtml=fin.length===0?"": `
      <div class="finance-section" id="fin-${week.id}">
        <div class="finance-header" onclick="toggleFinance('${week.id}')">
          <span class="finance-icon">💹</span>
          <span class="finance-title">Radar Financiero</span>
          <span class="finance-count">${fin.length} señal${fin.length!==1?"es":""}</span>
          <span class="finance-chevron">▼</span>
        </div>
        <div class="finance-body">
          ${fin.map((f,fi)=>{
            const typeLabels={pago:"Pago/prestación",fx:"Tipo de cambio",alerta:"Alerta",ciclo:"Ciclo nómina"};
            const flags2=(f.countries||[]).map(c=>FLAGS[c]||"").join(" ");
            const srcHtml=(f.sources||[]).length>0?`<div class="trend-sources" style="margin-top:6px"><button class="sources-toggle" id="srcbtn-fin-${week.id}-${fi}" onclick="toggleSources('fin-${week.id}-${fi}')">▾ ver fuentes</button><div class="sources-list" id="src-fin-${week.id}-${fi}">${(f.sources||[]).map((s,si)=>`<div class="source-item"><span class="source-num">[${si+1}]</span><a class="source-link" href="${s.url}" target="_blank" rel="noopener">${s.title}</a></div>`).join("")}</div></div>`:"";
            return `<div class="finance-item">
              <div class="finance-item-top"><span class="finance-name">${f.name}</span><span class="finance-type ftype-${f.type||"ciclo"}">${typeLabels[f.type]||f.type}</span></div>
              <div style="font-size:13px;margin-bottom:3px">${flags2}</div>
              <div class="finance-why">${f.why}</div>
              <div class="finance-action">💡 ${f.action}</div>
              ${srcHtml}
            </div>`;
          }).join("")}
        </div>
      </div>`;

    const secsHtml=week.sections.map(sec=>{
      if(TF.country!=="ALL"){
        if(sec.id==="transversal"&&TF.country!=="transversal")return "";
        else if(sec.id!=="transversal"&&sec.id!==TF.country.toLowerCase()&&TF.country!=="transversal")return "";
      }
      if(sec.subgroups){
        const subgroupsHtml=sec.subgroups.map(sg=>{
          if(TF.cat!=="ALL"&&TF.cat!=="pais"&&sg.id!==TF.cat)return "";
          const filtered=filterTrends(sg.trends);
          if(filtered.length===0)return "";
          const itemsHtml=filtered.map((t,i)=>renderTrendItem(t,i,sg.id)).join("");
          return `<div class="subgroup open" id="sg-${sg.id}">
            <div class="subgroup-header" style="background:${sg.color}" onclick="toggleSubgroup('${sg.id}')">
              <span class="subgroup-label" style="color:${sg.colorText}">${sg.label}</span>
              <span class="subgroup-count" style="background:${sg.colorText};color:#fff">${filtered.length}</span>
              <span class="subgroup-chevron" style="color:${sg.colorText}">▼</span>
            </div>
            <div class="subgroup-body">${itemsHtml}</div>
          </div>`;
        }).filter(Boolean).join("");
        if(!subgroupsHtml)return "";
        const totalCount=sec.subgroups.reduce((s,sg)=>s+filterTrends(sg.trends).length,0);
        return `<div class="sec-item open" id="sec-${sec.id}">
          <div class="sec-header" onclick="toggleSec('${sec.id}')">
            <span class="sec-icon">${sec.icon}</span>
            <div class="sec-info"><div class="sec-title">${sec.title}</div><div class="sec-sub">${sec.subtitle||"Todos los países"}</div></div>
            <span class="sec-badge">${totalCount} trend${totalCount!==1?"s":""}</span>
            <span class="sec-chevron">▼</span>
          </div>
          <div class="sec-body" style="padding:12px 16px">${subgroupsHtml}</div>
        </div>`;
      }
      if(TF.cat==="cultura-pop"||TF.cat==="tendencia-digital")return "";
      const filtered=filterTrends(sec.trends);
      if(filtered.length===0)return "";
      const tbody=filtered.map((t,i)=>renderTrendItem(t,i,sec.id)).join("");
      return `<div class="sec-item open" id="sec-${sec.id}">
        <div class="sec-header" onclick="toggleSec('${sec.id}')">
          <span class="sec-icon">${sec.icon}</span>
          <div class="sec-info"><div class="sec-title">${sec.title}</div>${sec.subtitle?`<div class="sec-sub">${sec.subtitle}</div>`:""}</div>
          <span class="sec-badge">${filtered.length} trend${filtered.length!==1?"s":""}</span>
          <span class="sec-chevron">▼</span>
        </div>
        <div class="sec-body">${tbody}</div>
      </div>`;
    }).filter(Boolean).join("");

    const totalAll=week.sections.reduce((s,sec)=>{
      if(sec.subgroups)return s+sec.subgroups.reduce((ss,sg)=>ss+sg.trends.length,0);
      return s+sec.trends.length;
    },0);

    return `<div class="week-card open" id="week-${week.id}">
      <div class="week-header" onclick="toggleWeek('${week.id}')">
        <div>
          <div class="week-label">${week.label}</div>
          <div class="week-meta">${totalAll} tendencias · ${fin.length} señal${fin.length!==1?"es":""} financiera${fin.length!==1?"s":""}</div>
        </div>
        <div class="week-right"><div style="display:flex;gap:4px">${week.sections.filter(s=>s.id!=="transversal").map(s=>`<span style="font-size:15px">${s.icon}</span>`).join("")}</div><span class="chevron">▼</span></div>
      </div>
      <div class="week-body">${renderNextWeek(week)}${finHtml}${secsHtml}</div>
    </div>`;
  }).join("");
}

(async()=>{
  try{
    const r=await fetch('data.b64?v='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const b64=(await r.text()).trim().replace(/\s+/g,'');
    const bin=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
    const s=new Blob([bin]).stream().pipeThrough(new DecompressionStream('gzip'));
    const t=await new Response(s).text();
    WEEKS=JSON.parse(t);
    console.log('[trends-radar] loaded',WEEKS.length,'weeks');
  }catch(e){
    console.error('[trends-radar] data.b64 load failed:',e);
  }
  renderTrends();
})();
</script>
